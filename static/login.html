<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Consult - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(37, 99, 235, 0.06) 0%, transparent 50%);
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .brand h1 span { color: #ffffff; }

        .brand p {
            color: #6b7280;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .brand-bar {
            width: 40px;
            height: 3px;
            background: #3b82f6;
            border-radius: 2px;
            margin: 0.8rem auto 0;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #9ca3af;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        .form-group input::placeholder {
            color: #4b5563;
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }

        .submit-btn:disabled {
            background: #374151;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error { color: #ef4444; }
        .success { color: #22c55e; }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 1rem auto;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .signup-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-card {
            animation: slideIn 0.4s ease-out;
        }

        @media (max-width: 768px) {
            .login-card { padding: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <h1>Meta<span>Consult</span></h1>
            <p>Sign in to your account</p>
            <div class="brand-bar"></div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="company_name">Company Name</label>
                <input type="text" id="company_name" name="company_name" placeholder="Enter your company name" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
            <div class="loader" id="loader"></div>
            <p class="message error" id="error-message">Error occurred. Please try again.</p>
            <p class="message success" id="success-message">Sign in successful! Redirecting...</p>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="http://localhost:8000/signup">Sign Up</a>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000';
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            submitBtn.disabled = true;
            loader.style.display = 'block';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            const formData = {
                email: document.getElementById('email').value,
                company_name: document.getElementById('company_name').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(BASE_URL + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = 'Sign in successful! Redirecting...';
                    successMessage.style.display = 'block';
                    errorMessage.style.display = 'none';
                    localStorage.setItem('access_token', data.access_token);
                    setTimeout(() => {
                        window.location.href = BASE_URL + '/main_page';
                    }, 1000);
                } else {
                    const errorText = {
                        400: data.detail || 'Invalid input. Please check your form data.',
                        401: 'Invalid credentials. Please try again.',
                        500: 'Server error. Please try again later.'
                    }[response.status] || 'Error occurred. Please try again.';
                    errorMessage.textContent = errorText;
                    errorMessage.style.display = 'block';
                    successMessage.style.display = 'none';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please check your connection.';
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
