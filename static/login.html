<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Consult - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .login-container {
            background: #000000;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-in;
        }
        .login-container h2 {
            text-align: center;
            color: #3b82f6;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #d1d5db;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-bottom: 2px solid #3b82f6;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-bottom-color: #60a5fa;
        }
        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .submit-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
        .error, .success {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .loader {
            display: none;
            border: 4px solid #3b82f6;
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .login-container { padding: 1.5rem; }
            .login-container h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login to Meta Consult</h2>
        <form id="login-form">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email" required>
                <label for="email">Email</label>
            </div>
            <div class="form-group">
                <input type="text" id="company_name" name="company_name" placeholder="Company Name" required>
                <label for="company_name">Company Name</label>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Login</button>
            <div class="loader" id="loader"></div>
            <p class="error" id="error-message">Error occurred. Please try again.</p>
            <p class="success" id="success-message">Login successful! Redirecting...</p>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            submitBtn.disabled = true;
            loader.style.display = 'block';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            const formData = {
                email: document.getElementById('email').value,
                company_name: document.getElementById('company_name').value,
                password: document.getElementById('password').value
            };

            try {
                console.log('Sending login request with data:', JSON.stringify(formData, null, 2));
                console.log('Request headers:', { 'Content-Type': 'application/json' });
                const response = await fetch('http://localhost:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                console.log('Response status:', response.status, response.statusText);
                console.log('Response headers:', [...response.headers.entries()]);

                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    successMessage.textContent = 'Login successful! Redirecting...';
                    successMessage.style.display = 'block';
                    errorMessage.style.display = 'none';
                    localStorage.setItem('access_token', data.access_token);
                    setTimeout(() => {
                        window.location.href = 'main_page.html';
                    }, 1000);
                } else {
                    const errorText = {
                        400: data.detail || 'Invalid input. Please check your form data.',
                        401: 'Invalid credentials. Please try again.',
                        500: 'Server error. Please try again later.'
                    }[response.status] || 'Error occurred. Please try again.';
                    errorMessage.textContent = errorText;
                    errorMessage.style.display = 'block';
                    successMessage.style.display = 'none';
                }
            } catch (error) {
                console.error('Login error:', error.message, error.stack);
                console.error('Possible CORS error. Check Network tab for blocked requests.');
                errorMessage.textContent = `Network error: ${error.message}. Check console for details.`;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
