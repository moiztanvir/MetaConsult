<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Consult - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .signup-container {
            background: #000000;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            animation: slideIn 0.5s ease-in;
        }
        .signup-container h2 {
            text-align: center;
            color: #3b82f6;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #d1d5db;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-bottom: 2px solid #3b82f6;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group select {
            appearance: none;
            background: #1a1a1a url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="white"><path d="M7 7l3 3 3-3m-6 6l3-3 3 3"/></svg>') no-repeat right 0.8rem center/12px;
        }
        .form-group select option {
            background: #1a1a1a;
            color: #ffffff;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-bottom-color: #60a5fa;
        }
        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem);
            font-size: 0.8rem;
            color: #3b82f6;
        }
        .form-group.checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .form-group.checkbox input {
            width: auto;
            margin-right: 0.5rem;
            accent-color: #3b82f6;
        }
        .form-group.checkbox label {
            display: inline-flex;
            align-items: center;
            font-size: 0.9rem;
            color: #d1d5db;
        }
        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .submit-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
        .error, .success {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .loader {
            display: none;
            border: 4px solid #3b82f6;
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .signup-container { padding: 1.5rem; }
            .signup-container h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>Sign Up for Meta Consult</h2>
        <form id="signup-form">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder=" " required>
                <label for="email">Email</label>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>
            <div class="form-group">
                <input type="text" id="full_name" name="full_name" placeholder=" " required>
                <label for="full_name">Full Name</label>
            </div>
            <div class="form-group">
                <input type="text" id="company_name" name="company_name" placeholder=" " required>
                <label for="company_name">Company Name</label>
            </div>
            <div class="form-group">
                <select id="industry" name="industry" required>
                    <option value="">Select Industry</option>
                    <option value="Retail">Retail</option>
                    <option value="Technology">Technology</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Finance">Finance</option>
                    <option value="Education">Education</option>
                    <option value="Hospitality">Hospitality</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Other">Other</option>
                </select>
                <label for="industry">Industry</label>
            </div>
            <div class="form-group">
                <select id="company_size" name="company_size">
                    <option value="">Select Size</option>
                    <option value="1-10">1–10 employees</option>
                    <option value="11-50">11–50 employees</option>
                    <option value="51-200">51–200 employees</option>
                    <option value="201+">201+ employees</option>
                </select>
                <label for="company_size">Company Size (Optional)</label>
            </div>
            <div class="form-group">
                <select id="revenue" name="revenue">
                    <option value="">Select Revenue</option>
                    <option value="<100K">&lt; $100K</option>
                    <option value="100K-1M">$100K–$1M</option>
                    <option value="1M-10M">$1M–$10M</option>
                    <option value=">10M">&gt; $10M</option>
                    <option value="prefer_not_to_say">Prefer not to say</option>
                </select>
                <label for="revenue">Annual Revenue (Optional)</label>
            </div>
            <div class="form-group">
                <select id="role" name="role">
                    <option value="">Select Role</option>
                    <option value="Owner">Owner/Founder</option>
                    <option value="CEO">CEO/CTO/CFO</option>
                    <option value="Manager">Manager</option>
                    <option value="Consultant">Consultant</option>
                    <option value="Other">Other</option>
                </select>
                <label for="role">Business Role (Optional)</label>
            </div>
            <div class="form-group">
                <select id="country" name="country">
                    <option value="">Select Country</option>
                    <option value="PK">Pakistan</option>
                    <option value="US">United States</option>
                    <option value="IN">India</option>
                    <option value="GB">United Kingdom</option>
                    <option value="Other">Other</option>
                </select>
                <label for="country">Country (Optional)</label>
            </div>
            <div class="form-group">
                <select id="challenge" name="challenge">
                    <option value="">Select Challenge</option>
                    <option value="Increasing sales">Increasing sales/revenue</option>
                    <option value="Reducing costs">Reducing costs</option>
                    <option value="Supply chain">Supply chain optimization</option>
                    <option value="Marketing">Marketing strategy</option>
                    <option value="Employee retention">Employee retention</option>
                    <option value="Other">Other</option>
                </select>
                <label for="challenge">Primary Business Challenge (Optional)</label>
            </div>
            <div class="form-group">
                <select id="referral" name="referral">
                    <option value="">Select Source</option>
                    <option value="Social media">Social media</option>
                    <option value="Search engine">Search engine</option>
                    <option value="Colleague">Colleague/Friend</option>
                    <option value="Event">Industry event</option>
                    <option value="Other">Other</option>
                </select>
                <label for="referral">How did you hear about us? (Optional)</label>
            </div>
            <div class="form-group checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="/terms" target="_blank" style="color: #3b82f6;">Terms and Conditions</a></label>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Sign Up</button>
            <div class="loader" id="loader"></div>
            <p class="error" id="error-message">Error occurred. Please try again.</p>
            <p class="success" id="success-message">Account created! Check your email for verification.</p>
        </form>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            submitBtn.disabled = true;
            loader.style.display = 'block';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                full_name: document.getElementById('full_name').value,
                company_name: document.getElementById('company_name').value,
                industry: document.getElementById('industry').value,
                company_size: document.getElementById('company_size').value || null,
                revenue: document.getElementById('revenue').value || null,
                role: document.getElementById('role').value || null,
                country: document.getElementById('country').value || null,
                challenge: document.getElementById('challenge').value || null,
                referral: document.getElementById('referral').value || null,
                terms: document.getElementById('terms').checked
            };

            try {
                console.log('Sending signup request with data:', JSON.stringify(formData, null, 2));
                console.log('Request headers:', { 'Content-Type': 'application/json' });
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                console.log('Response status:', response.status, response.statusText);
                console.log('Response headers:', [...response.headers.entries()]);

                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    successMessage.textContent = data.message || 'Account created! Check your email for verification.';
                    successMessage.style.display = 'block';
                    errorMessage.style.display = 'none';
                    document.getElementById('signup-form').reset();
                } else {
                    const errorText = {
                        400: data.detail || 'Invalid input. Please check your form data.',
                        401: 'Unauthorized request. Please try again.',
                        409: 'Email already registered.',
                        500: 'Server error. Please try again later.'
                    }[response.status] || 'Error occurred. Please try again.';
                    errorMessage.textContent = errorText;
                    errorMessage.style.display = 'block';
                    successMessage.style.display = 'none';
                }
            } catch (error) {
                console.error('Signup error:', error.message, error.stack);
                console.error('Possible CORS error. Check Network tab for blocked requests.');
                errorMessage.textContent = `Network error: ${error.message}. Check console for details.`;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
